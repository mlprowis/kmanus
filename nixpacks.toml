[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npm run build --workspace=@grvt-grid/bot",
  "cd packages/dashboard && npx vite build",
  "mkdir -p packages/bot/dist/dashboard/public",
  "cp -r packages/dashboard/dist/. packages/bot/dist/dashboard/public/"
]

[start]
cmd = "node -e \"const fs=require('fs');fs.mkdirSync('/etc/grvt-grid',{recursive:true});fs.writeFileSync('/etc/grvt-grid/master.key',Buffer.from(process.env.MASTER_KEY_HEX,'hex'));\" && node packages/bot/dist/dashboard/server.js"
